name: Algolia DocSearch Scraper

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load scraper config
        env:
          INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          {
            echo 'CONFIG<<__EOF__'
            jq -c --arg name "$INDEX_NAME" '.index_name = $name' docsearch.config.json
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: Run DocSearch scraper
        env:
          APPLICATION_ID: ${{ secrets.ALGOLIA_APP_ID }}
          API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}
        run: |
          docker run \
            -e APPLICATION_ID \
            -e API_KEY \
            -e "CONFIG=${CONFIG}" \
            algolia/docsearch-scraper
